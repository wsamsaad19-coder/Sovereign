name: Sovereign-Forge
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile Sovereign Dylib
        run: |
          echo "🔥 بدء تشغيل مفاعل البصرة المليمتري..."
          
          # استخراج مسار نظام الآيفون ديناميكياً لتجنب أي خطأ
          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # التأكد من وجود الملف قبل الصهر
          if [ ! -f "Sovereign_Agent_Core.mm" ]; then
            echo "❌ خطأ كارثي: ملف Sovereign_Agent_Core.mm غير موجود! تأكد من الاسم."
            exit 1
          fi
          
          # أمر الصهر السيادي
          clang -dynamiclib -arch arm64 Sovereign_Agent_Core.mm -o Wsam_Core.dylib -isysroot $SDK_PATH -framework Foundation -framework UIKit -framework CoreGraphics -framework QuartzCore -fobjc-arc
          
          echo "✅ تم الصهر بنجاح! النصر حليفنا."

      - name: Upload Sovereign Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wsam-Dylib-Ready
          path: Wsam_Core.dylib
