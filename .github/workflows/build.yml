name: Sovereign-Final-Forge
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Sovereign Ignition
        run: |
          echo "🔥 بدء تشغيل مفاعل البصرة السيادي..."
          
          # 1. كتابة النخاع البرمجي (الدايلب) مباشرة داخل السيرفر
          cat << 'EOF' > sovereign_core.mm
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <mach/mach.h>
          #import <Foundation/Foundation.h>

          // [🎯] إحداثيات مركز القيادة - الجنرال وسام الصافي
          #define SERVER_API @"http://files.free.nf/wsam_core/dashboard_v50.php?api=true"

          @interface SovereignUI : UIView
          @property (nonatomic, strong) UILabel *msgLabel;
          @property (nonatomic, strong) UIView *lamp;
          @end

          @implementation SovereignUI
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.8];
                  self.layer.cornerRadius = 10;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.0;
                  
                  self.msgLabel = [[UILabel alloc] initWithFrame:CGRectMake(5, 5, 170, 20)];
                  self.msgLabel.text = @"جاري الاتصال بالسيرفر...";
                  self.msgLabel.textColor = [UIColor yellowColor];
                  self.msgLabel.font = [UIFont boldSystemFontOfSize:10];
                  [self addSubview:self.msgLabel];
                  
                  self.lamp = [[UIView alloc] initWithFrame:CGRectMake(frame.size.width - 20, 10, 10, 10)];
                  self.lamp.backgroundColor = [UIColor yellowColor];
                  self.lamp.layer.cornerRadius = 5;
                  [self addSubview:self.lamp];
                  
                  [self checkServer];
                  
                  UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handlePan:)];
                  [self addGestureRecognizer:pan];
              }
              return self;
          }

          - (void)handlePan:(UIPanGestureRecognizer *)p {
              CGPoint t = [p translationInView:self.superview];
              self.center = CGPointMake(self.center.x + t.x, self.center.y + t.y);
              [p setTranslation:CGPointZero inView:self.superview];
          }

          - (void)checkServer {
              [[[NSURLSession sharedSession] dataTaskWithURL:[NSURL URLWithString:SERVER_API] completionHandler:^(NSData *d, NSURLResponse *r, NSError *e) {
                  dispatch_async(dispatch_get_main_queue(), ^{
                      if (e || !d) {
                          self.msgLabel.text = @"فشل الاتصال!";
                          self.lamp.backgroundColor = [UIColor redColor];
                          return;
                      }
                      NSDictionary *json = [NSJSONSerialization JSONObjectWithData:d options:0 error:nil];
                      NSString *status = json[@"status"];
                      if ([status isEqualToString:@"maintenance"]) {
                          [self showMaintenance:json[@"message"]];
                      } else if ([status isEqualToString:@"safe"]) {
                          self.msgLabel.text = @"الحماية مفعلة ✅";
                          self.msgLabel.textColor = [UIColor greenColor];
                          self.lamp.backgroundColor = [UIColor greenColor];
                      } else {
                          self.msgLabel.text = @"مكشوف! 🛑";
                          self.lamp.backgroundColor = [UIColor redColor];
                      }
                  });
              }] resume];
          }

          - (void)showMaintenance:(NSString *)m {
              self.hidden = YES;
              UIView *v = [[UIView alloc] initWithFrame:[UIScreen mainScreen].bounds];
              v.backgroundColor = [UIColor blackColor];
              UILabel *l = [[UILabel alloc] initWithFrame:v.bounds];
              l.text = [NSString stringWithFormat:@"🛑 صيانة: %@", m];
              l.textColor = [UIColor orangeColor];
              l.textAlignment = NSTextAlignmentCenter;
              l.numberOfLines = 0;
              [v addSubview:l];
              [[[UIApplication sharedApplication] keyWindow] addSubview:v];
          }
          @end

          void __attribute__((constructor)) init() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 5 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  UIWindow *w = [[UIApplication sharedApplication] keyWindow];
                  SovereignUI *ui = [[SovereignUI alloc] initWithFrame:CGRectMake(50, 50, 180, 40)];
                  [w addSubview:ui];
              });
          }
          EOF

          echo "✅ تم حقن النخاع البرمجي."

          # 2. جلب مسار الـ SDK الرسمي للآيفون
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # 3. الصهر المباشر ARM64
          clang -dynamiclib -arch arm64 sovereign_core.mm -o Sovereign_Wsam.dylib -isysroot $SDK_PATH -framework Foundation -framework UIKit -fobjc-arc
          
          echo "✅ تمت عملية الصهر بنجاح يا جنرال!"

      - name: Delivery
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Dylib
          path: Sovereign_Wsam.dylib
