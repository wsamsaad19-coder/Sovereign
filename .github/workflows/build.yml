name: Sovereign-God-Mode-Forge
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sovereign Ignition & Compilation
        run: |
          echo "🔥 بدء مفاعل البصرة (وضع الإجبار المطلق)..."
          
          # استخراج مسار الآيفون الرسمي
          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # [رادار السحق]: البحث عن أي ملف يبدأ بـ Sovereign مهما كان امتداده
          TARGET_FILE=$(find . -maxdepth 1 -name "Sovereign*" -type f | head -n 1)
          
          if [ -z "$TARGET_FILE" ]; then
            echo "❌ خطأ: لا يوجد أي ملف يبدأ بكلمة Sovereign في الواجهة الرئيسية."
            exit 1
          fi
          
          echo "✅ تم القبض على الهدف: $TARGET_FILE"
          echo "🔄 جاري تغيير الجينات البرمجية للملف بالقوة العسكرية..."
          
          # تغيير اسم الملف وامتداده بالقوة لكي يقبله مترجم آبل
          mv "$TARGET_FILE" wsam_core.mm
          
          # أمر الصهر النهائي
          clang -dynamiclib -arch arm64 wsam_core.mm -o Sovereign_Weapon.dylib -isysroot $SDK_PATH -framework Foundation -framework UIKit -framework CoreGraphics -framework QuartzCore -fobjc-arc
          
          echo "✅ تمت عملية الصهر بنجاح يا جنرال وسام!"

      - name: Upload Sovereign Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Dylib-Ready
          path: Sovereign_Weapon.dylib
