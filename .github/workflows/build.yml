name: Sovereign-Ultimate-Forge
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sovereign Ignition & Compilation
        run: |
          echo "🔥 بدء تشغيل مفاعل البصرة ذاتي الشفاء..."
          
          # استخراج مسار الآيفون الرسمي من سيرفرات آبل
          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # [تكتيك الرادار]: البحث التلقائي عن ملف الكود الخاص بالجنرال مهما كان اسمه
          SRC_FILE=$(ls Sovereign*.mm Sovereign*.cpp 2>/dev/null | head -n 1)
          
          if [ -z "$SRC_FILE" ]; then
            echo "❌ خطأ كارثي: لم أجد ملف الكود! تأكد أن الملف موجود في الواجهة الرئيسية."
            exit 1
          fi
          
          echo "✅ تم رصد نخاع الهدف: $SRC_FILE"
          
          # أمر الصهر الإجباري (يجبر السيرفر على فهم الكود كـ Objective-C++ مهما كانت صيغته)
          clang -x objective-c++ -dynamiclib -arch arm64 "$SRC_FILE" -o Sovereign_Weapon.dylib -isysroot $SDK_PATH -framework Foundation -framework UIKit -framework CoreGraphics -framework QuartzCore -fobjc-arc
          
          echo "✅ تمت عملية الصهر بنجاح يا جنرال!"

      - name: Upload Sovereign Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Dylib-Ready
          path: Sovereign_Weapon.dylib
